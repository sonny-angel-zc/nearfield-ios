<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nearfield</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 4px;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 15px;
        }

        /* 3D Scene Container */
        .scene-container {
            width: 280px;
            height: 280px;
            position: relative;
            margin: 10px 0;
            border-radius: 50%;
            overflow: hidden;
            background: radial-gradient(circle at 30% 30%, #1a1a24, #0a0a0f);
            box-shadow:
                inset 0 0 60px rgba(74, 158, 255, 0.1),
                0 0 40px rgba(74, 158, 255, 0.05);
        }

        .scene-container canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Info display */
        .info-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 280px;
            margin: 15px 0;
            font-family: monospace;
        }

        .info-label {
            color: #666;
            font-size: 0.75rem;
        }

        .info-value {
            color: #50c878;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .info-value.no-peer {
            color: #666;
        }

        /* Note display */
        .note-display {
            text-align: center;
            margin: 10px 0;
        }

        .my-note {
            font-size: 3rem;
            font-weight: 200;
            color: #4a9eff;
        }

        .my-freq {
            font-family: monospace;
            font-size: 1rem;
            color: #666;
        }

        .detune-indicator {
            font-family: monospace;
            font-size: 0.8rem;
            color: #ff9500;
            height: 1.2em;
        }

        /* Play button */
        .play-button {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1a1a24, #12121a);
            border: 2px solid #2a2a3a;
            color: #4a9eff;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }

        .play-button.playing {
            background: linear-gradient(145deg, #4a9eff, #3a7ecc);
            color: #fff;
            border-color: #4a9eff;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.4);
        }

        /* Note selector */
        .note-selector {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0;
            max-width: 320px;
        }

        .note-btn {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            color: #888;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .note-btn.selected {
            background: #4a9eff;
            border-color: #4a9eff;
            color: #fff;
        }

        /* Status */
        .status-bar {
            font-size: 0.7rem;
            color: #444;
            margin-top: auto;
            padding: 10px;
            text-align: center;
        }

        /* Loading Screen */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-title {
            font-size: 1.8rem;
            font-weight: 300;
            color: #fff;
            margin-bottom: 30px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid #1a1a24;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-steps {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.85rem;
        }

        .loading-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            color: #444;
            transition: color 0.3s;
        }

        .loading-step.active {
            color: #4a9eff;
        }

        .loading-step.done {
            color: #50c878;
        }

        .loading-step-icon {
            width: 18px;
            text-align: center;
            font-size: 0.75rem;
        }

        .loading-step.active .loading-step-icon::before {
            content: "●";
            animation: pulse 1s ease infinite;
        }

        .loading-step.done .loading-step-icon::before {
            content: "✓";
        }

        .loading-step:not(.active):not(.done) .loading-step-icon::before {
            content: "○";
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-title">Nearfield</div>
        <div class="loading-spinner"></div>
        <ul class="loading-steps">
            <li class="loading-step" id="step-audio">
                <span class="loading-step-icon"></span>
                <span>Initializing audio engine</span>
            </li>
            <li class="loading-step" id="step-3d">
                <span class="loading-step-icon"></span>
                <span>Setting up 3D compass</span>
            </li>
            <li class="loading-step" id="step-uwb">
                <span class="loading-step-icon"></span>
                <span>Starting UWB ranging</span>
            </li>
            <li class="loading-step" id="step-peers">
                <span class="loading-step-icon"></span>
                <span>Searching for nearby devices</span>
            </li>
        </ul>
    </div>

    <div class="container">
        <h1>Nearfield</h1>
        <p class="subtitle">Tilt to detune / Get closer for harmonics</p>

        <div class="scene-container" id="sceneContainer"></div>

        <div class="info-row">
            <div>
                <div class="info-label">NEAREST</div>
                <div class="info-value" id="distanceValue">--</div>
            </div>
            <div style="text-align: right;">
                <div class="info-label">PEERS</div>
                <div class="info-value" id="peerCount">0</div>
            </div>
        </div>

        <div class="note-display">
            <div class="my-note" id="myNote">A4</div>
            <div class="my-freq" id="myFreq">440.0 Hz</div>
            <div class="detune-indicator" id="detuneIndicator"></div>
        </div>

        <button class="play-button" id="playButton">
            TAP TO<br>PLAY
        </button>

        <div class="note-selector" id="noteSelector"></div>

        <div class="status-bar" id="statusBar">Searching for nearby devices...</div>
    </div>

    <script>
        // ==================== AUDIO ====================
        let audioCtx = null;

        const notes = {
            'A3': 220.00, 'C4': 261.63, 'D4': 293.66, 'E4': 329.63,
            'G4': 392.00, 'A4': 440.00, 'C5': 523.25, 'D5': 587.33
        };

        let phoneOsc = null;
        let phoneGain = null;
        let isPlaying = false;
        let currentNote = 'A4';
        let harmonicOscs = [];
        let harmonicGains = [];

        const maxDetuneCents = 50;
        let currentDetune = 0;

        // ==================== MULTI-PEER HARMONY ====================
        // Pentatonic scale base frequencies for peer assignment
        const pentatonicScale = [
            { note: 'C4', freq: 261.63 },
            { note: 'D4', freq: 293.66 },
            { note: 'E4', freq: 329.63 },
            { note: 'G4', freq: 392.00 },
            { note: 'A4', freq: 440.00 },
            { note: 'C5', freq: 523.25 },
            { note: 'D5', freq: 587.33 },
            { note: 'E5', freq: 659.25 }
        ];

        // Deterministic hash to assign peer a note index
        function hashPeerName(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = ((hash << 5) - hash) + name.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash) % pentatonicScale.length;
        }

        // Per-peer audio state
        let peerAudio = {};  // name → { osc, oscTriangle, gain, panner, harmonicOscs, harmonicGains }

        // ==================== NATIVE DATA ====================
        let nativeData = {
            nearestDistance: -1,
            peerCount: 0,
            peers: {},
            tiltX: 0,
            tiltY: 0
        };

        // ==================== THREE.JS ====================
        let scene, camera, renderer;
        let centerSphere;
        let peerSpheres = {};
        let distanceRings = [];
        let peerLines = {};  // name → { line, material }
        let compassGroup;  // Group that rotates with device tilt

        const MAX_RANGE = 5;  // 5 meters max range
        const SCENE_RADIUS = 2;  // Scene fits in 2 unit radius
        const SCALE = SCENE_RADIUS / MAX_RANGE;  // Convert meters to scene units

        // Smoothed tilt values
        let smoothTiltX = 0;
        let smoothTiltY = 0;

        function initThreeJS() {
            const container = document.getElementById('sceneContainer');
            const width = container.offsetWidth;
            const height = container.offsetHeight;

            // Scene
            scene = new THREE.Scene();

            // Camera - overhead compass view
            camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 100);
            camera.position.set(0, 5, 0);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            container.appendChild(renderer.domElement);

            // Compass group - everything inside rotates with device tilt
            compassGroup = new THREE.Group();
            scene.add(compassGroup);

            // Lighting (attached to scene, not compass)
            const ambientLight = new THREE.AmbientLight(0x606060, 0.8);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(2, 5, 2);
            scene.add(mainLight);

            const fillLight = new THREE.PointLight(0x4a9eff, 0.4, 15);
            fillLight.position.set(-2, 3, -2);
            scene.add(fillLight);

            // Center sphere (you) - stays at origin
            const centerGeometry = new THREE.SphereGeometry(0.08, 32, 32);
            const centerMaterial = new THREE.MeshPhongMaterial({
                color: 0x4a9eff,
                emissive: 0x4a9eff,
                emissiveIntensity: 0.5,
                shininess: 100
            });
            centerSphere = new THREE.Mesh(centerGeometry, centerMaterial);
            centerSphere.position.set(0, 0, 0);
            compassGroup.add(centerSphere);

            // Center glow
            const glowGeometry = new THREE.SphereGeometry(0.12, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x4a9eff,
                transparent: true,
                opacity: 0.2
            });
            const centerGlow = new THREE.Mesh(glowGeometry, glowMaterial);
            centerSphere.add(centerGlow);

            // Distance rings (at 1m, 2m, 3m, 4m, 5m)
            [1, 2, 3, 4, 5].forEach((meters, i) => {
                const radius = meters * SCALE;
                const ringGeometry = new THREE.RingGeometry(radius - 0.01, radius + 0.01, 64);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: 0x4a9eff,
                    transparent: true,
                    opacity: 0.15 - i * 0.02,
                    side: THREE.DoubleSide
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = -Math.PI / 2;
                ring.position.y = 0;
                compassGroup.add(ring);
                distanceRings.push(ring);
            });

            // Cardinal direction markers
            const markerGeometry = new THREE.ConeGeometry(0.04, 0.12, 8);
            const directions = [
                { angle: 0, color: 0xff4444, label: 'N' },           // North (front)
                { angle: Math.PI, color: 0x666666, label: 'S' },     // South
                { angle: Math.PI / 2, color: 0x666666, label: 'E' }, // East
                { angle: -Math.PI / 2, color: 0x666666, label: 'W' } // West
            ];

            directions.forEach(dir => {
                const markerMaterial = new THREE.MeshBasicMaterial({ color: dir.color });
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                const r = SCENE_RADIUS + 0.1;
                marker.position.set(Math.sin(dir.angle) * r, 0, -Math.cos(dir.angle) * r);
                marker.rotation.x = Math.PI / 2;
                marker.rotation.z = -dir.angle;
                compassGroup.add(marker);
            });

            // Subtle crosshair lines
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x4a9eff,
                transparent: true,
                opacity: 0.1
            });

            // N-S line
            const nsGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(0, 0, -SCENE_RADIUS),
                new THREE.Vector3(0, 0, SCENE_RADIUS)
            ]);
            compassGroup.add(new THREE.Line(nsGeometry, lineMaterial));

            // E-W line
            const ewGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(-SCENE_RADIUS, 0, 0),
                new THREE.Vector3(SCENE_RADIUS, 0, 0)
            ]);
            compassGroup.add(new THREE.Line(ewGeometry, lineMaterial));

            // Start animation loop
            animate();
        }

        function createPeerSphere(name) {
            const geometry = new THREE.SphereGeometry(0.1, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: 0x50c878,
                emissive: 0x50c878,
                emissiveIntensity: 0.4,
                shininess: 100
            });
            const sphere = new THREE.Mesh(geometry, material);

            // Add glow
            const glowGeometry = new THREE.SphereGeometry(0.15, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0x50c878,
                transparent: true,
                opacity: 0.2
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            sphere.add(glow);

            sphere.userData = { name, glow, material, targetPos: new THREE.Vector3() };
            compassGroup.add(sphere);  // Add to compass group so it tilts with device
            return sphere;
        }

        function updatePeerSpheres() {
            const peers = nativeData.peers || {};
            const currentPeerNames = new Set(Object.keys(peers));

            // Remove spheres and lines for peers that left
            for (const name of Object.keys(peerSpheres)) {
                if (!currentPeerNames.has(name)) {
                    compassGroup.remove(peerSpheres[name]);
                    delete peerSpheres[name];
                    if (peerLines[name]) {
                        compassGroup.remove(peerLines[name].line);
                        peerLines[name].material.dispose();
                        peerLines[name].geometry.dispose();
                        delete peerLines[name];
                    }
                }
            }

            // Update or create spheres for current peers
            for (const [name, peer] of Object.entries(peers)) {
                if (!peer || peer.distance < 0) continue;

                // Create sphere if needed
                if (!peerSpheres[name]) {
                    peerSpheres[name] = createPeerSphere(name);
                }

                const sphere = peerSpheres[name];

                // Calculate 3D position from direction vector
                // Clamp distance to max range
                const clampedDistance = Math.min(peer.distance, MAX_RANGE);
                let x = 0, y = 0, z = 0;

                // Check if we have valid direction data (not zero vector)
                const hasDirection = peer.directionX !== undefined &&
                    peer.directionY !== undefined &&
                    peer.directionZ !== undefined;
                const magnitude = hasDirection ? Math.sqrt(
                    peer.directionX ** 2 + peer.directionY ** 2 + peer.directionZ ** 2
                ) : 0;

                if (hasDirection && magnitude > 0.01) {
                    // Use direction vector
                    // X = left/right, Y = up/down, Z = forward/back
                    x = (peer.directionX / magnitude) * clampedDistance * SCALE;
                    y = (peer.directionY / magnitude) * clampedDistance * SCALE;
                    z = -(peer.directionZ / magnitude) * clampedDistance * SCALE;  // Negate Z so forward is -Z
                } else if (peer.horizontalAngle !== undefined && peer.horizontalAngle !== 0) {
                    // Fallback to horizontal angle
                    x = Math.sin(peer.horizontalAngle) * clampedDistance * SCALE;
                    z = -Math.cos(peer.horizontalAngle) * clampedDistance * SCALE;
                } else {
                    // No direction data - place at distance directly in front
                    z = -clampedDistance * SCALE;
                }

                // Store target position
                sphere.userData.targetPos.set(x, y, z);

                // Smoothly interpolate position
                sphere.position.x += (x - sphere.position.x) * 0.2;
                sphere.position.y += (y - sphere.position.y) * 0.2;
                sphere.position.z += (z - sphere.position.z) * 0.2;

                // Change color based on proximity
                const isClose = peer.distance < 0.5;
                const targetColor = isClose ? 0xff6b6b : 0x50c878;
                const targetEmissive = isClose ? 0xff6b6b : 0x50c878;

                sphere.userData.material.color.setHex(targetColor);
                sphere.userData.material.emissive.setHex(targetEmissive);
                sphere.userData.material.emissiveIntensity = isClose ? 0.6 : 0.4;
                sphere.userData.glow.material.color.setHex(targetColor);
                sphere.userData.glow.material.opacity = isClose ? 0.3 : 0.2;

                // Scale based on proximity (closer = larger)
                const scale = 0.8 + (1 - Math.min(peer.distance / MAX_RANGE, 1)) * 0.6;
                sphere.scale.setScalar(scale);

                // Connecting line between center and peer
                if (!peerLines[name]) {
                    const lineGeom = new THREE.BufferGeometry();
                    const positions = new Float32Array(6); // 2 points × 3 coords
                    lineGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    const lineMat = new THREE.LineBasicMaterial({
                        color: 0x4a9eff,
                        transparent: true,
                        opacity: 0.0
                    });
                    const line = new THREE.Line(lineGeom, lineMat);
                    compassGroup.add(line);
                    peerLines[name] = { line, material: lineMat, geometry: lineGeom };
                }

                // Update line endpoints
                const pl = peerLines[name];
                const posAttr = pl.geometry.getAttribute('position');
                posAttr.array[0] = 0; posAttr.array[1] = 0; posAttr.array[2] = 0; // center
                posAttr.array[3] = sphere.position.x;
                posAttr.array[4] = sphere.position.y;
                posAttr.array[5] = sphere.position.z;
                posAttr.needsUpdate = true;

                // Line brightness: exponential glow as distance decreases
                const lineOpacity = Math.pow(1 - Math.min(peer.distance / MAX_RANGE, 1), 2) * 0.8;
                pl.material.opacity = lineOpacity;
                // Color shifts from blue to warm white when very close
                const warmth = Math.pow(1 - Math.min(peer.distance / 1.5, 1), 2);
                const r = 0x4a + Math.round((0xff - 0x4a) * warmth);
                const g = 0x9e + Math.round((0xdd - 0x9e) * warmth);
                const b = 0xff;
                pl.material.color.setRGB(r / 255, g / 255, b / 255);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Apply device tilt to compass group
            // tiltX = roll (left/right tilt), tiltY = pitch (forward/back tilt)
            const tiltX = nativeData.tiltX || 0;
            const tiltY = nativeData.tiltY || 0;

            // Smooth the tilt values
            smoothTiltX += (tiltX - smoothTiltX) * 0.1;
            smoothTiltY += (tiltY - smoothTiltY) * 0.1;

            // Apply tilt to compass - this lets you "look around" by tilting the phone
            // Tilt forward/back rotates around X axis, tilt left/right rotates around Z axis
            if (compassGroup) {
                const maxTilt = 0.6;  // Max tilt in radians (~35 degrees)
                compassGroup.rotation.x = Math.max(-maxTilt, Math.min(maxTilt, smoothTiltY * 1.5));
                compassGroup.rotation.z = Math.max(-maxTilt, Math.min(maxTilt, -smoothTiltX * 1.5));
            }

            // Pulse the center sphere glow
            if (centerSphere && centerSphere.children[0]) {
                const pulse = 0.2 + Math.sin(Date.now() / 500) * 0.1;
                centerSphere.children[0].material.opacity = pulse;
            }

            // Update peer positions
            updatePeerSpheres();

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        // ==================== AUDIO FUNCTIONS ====================
        let masterGain = null;
        let delayNode = null;
        let delayFeedback = null;
        let delayWet = null;
        let delayTone = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!masterGain) {
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.76;

                // Delay/reverb effect chain
                delayNode = audioCtx.createDelay(1.0);
                delayNode.delayTime.value = 0.42;
                delayFeedback = audioCtx.createGain();
                delayFeedback.gain.value = 0.32;
                delayWet = audioCtx.createGain();
                delayWet.gain.value = 0.2;
                delayTone = audioCtx.createBiquadFilter();
                delayTone.type = 'lowpass';
                delayTone.frequency.value = 2400;
                delayTone.Q.value = 0.3;

                // Feedback loop: delay → feedback → delay
                delayNode.connect(delayFeedback);
                delayFeedback.connect(delayNode);
                // Wet signal to output
                delayNode.connect(delayTone);
                delayTone.connect(delayWet);
                delayWet.connect(audioCtx.destination);

                // Dry signal
                masterGain.connect(audioCtx.destination);
                // Send dry to delay for wet mix
                masterGain.connect(delayNode);
            }
        }

        // Create layered oscillator (sine + soft triangle) for warmth
        function createLayeredOsc(freq, gainNode) {
            const sine = audioCtx.createOscillator();
            sine.type = 'sine';
            sine.frequency.value = freq;

            const triangle = audioCtx.createOscillator();
            triangle.type = 'triangle';
            triangle.frequency.value = freq;

            const triGain = audioCtx.createGain();
            triGain.gain.value = 0.15; // Subtle triangle blend

            sine.connect(gainNode);
            triangle.connect(triGain);
            triGain.connect(gainNode);

            sine.start();
            triangle.start();

            return { sine, triangle, triGain };
        }

        // Exponential proximity mapping for natural fade-in
        function exponentialGain(distance, maxDist, maxGain) {
            if (distance < 0 || distance > maxDist) return 0;
            const normalized = 1 - (distance / maxDist);
            // Exponential curve: quiet until close, then ramps up fast
            return Math.pow(normalized, 2.5) * maxGain;
        }

        function smoothParam(param, value, timeConstant = 0.22) {
            param.cancelScheduledValues(audioCtx.currentTime);
            param.setTargetAtTime(value, audioCtx.currentTime, timeConstant);
        }

        function setupPeerAudio(peerName, peer) {
            if (peerAudio[peerName]) return; // Already set up

            const noteIdx = hashPeerName(peerName);
            const baseFreq = pentatonicScale[noteIdx].freq;

            // Per-peer gain
            const gain = audioCtx.createGain();
            gain.gain.value = 0;

            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 900;
            filter.Q.value = 0.7;

            // Per-peer stereo panner
            const panner = audioCtx.createStereoPanner();
            panner.pan.value = 0;

            // Chain: oscillators → gain → filter → panner → master
            gain.connect(filter);
            filter.connect(panner);
            panner.connect(masterGain);

            // Create layered base oscillator
            const { sine: osc, triangle: oscTriangle, triGain } = createLayeredOsc(baseFreq, gain);

            // Create harmonic oscillators for this peer
            const harmonicRatios = [2, 1.5, 1.25];
            const peerHarmonicOscs = [];
            const peerHarmonicGains = [];

            harmonicRatios.forEach(ratio => {
                const hGain = audioCtx.createGain();
                hGain.gain.value = 0;
                hGain.connect(filter);

                const { sine: hOsc, triangle: hTri } = createLayeredOsc(baseFreq * ratio, hGain);
                peerHarmonicOscs.push({ sine: hOsc, triangle: hTri });
                peerHarmonicGains.push(hGain);
            });

            peerAudio[peerName] = {
                osc, oscTriangle, triGain, gain, filter, panner,
                harmonicOscs: peerHarmonicOscs,
                harmonicGains: peerHarmonicGains,
                baseFreq, noteIdx,
                connectedAt: audioCtx.currentTime
            };
        }

        function teardownPeerAudio(peerName) {
            const pa = peerAudio[peerName];
            if (!pa) return;
            try { pa.osc.stop(); } catch(e) {}
            try { pa.oscTriangle.stop(); } catch(e) {}
            pa.harmonicOscs.forEach(h => {
                try { h.sine.stop(); } catch(e) {}
                try { h.triangle.stop(); } catch(e) {}
            });
            pa.gain.disconnect();
            pa.filter.disconnect();
            pa.panner.disconnect();
            delete peerAudio[peerName];
        }

        function updatePeerAudio() {
            if (!isPlaying || !audioCtx) return;

            const peers = nativeData.peers || {};
            const currentPeerNames = new Set(Object.keys(peers));

            // Remove audio for peers that left
            for (const name of Object.keys(peerAudio)) {
                if (!currentPeerNames.has(name)) {
                    teardownPeerAudio(name);
                }
            }

            // Update or create audio for current peers
            for (const [name, peer] of Object.entries(peers)) {
                if (!peer || peer.distance < 0) continue;

                setupPeerAudio(name, peer);
                const pa = peerAudio[name];
                const t = audioCtx.currentTime;

                // Exponential volume based on distance, with a gentle first-connection warm-up
                const connectionAge = Math.max(0, t - pa.connectedAt);
                const warmup = Math.min(1, connectionAge / 1.4);
                const warmupShape = warmup * warmup;
                const baseGain = exponentialGain(peer.distance, 3.0, 0.2) * warmupShape;
                smoothParam(pa.gain.gain, baseGain, 0.26);

                // Spatial panning from direction data
                let panValue = 0;
                if (peer.horizontalAngle !== undefined && peer.horizontalAngle !== 0) {
                    // horizontalAngle: radians, negative = left, positive = right
                    panValue = Math.max(-1, Math.min(1, Math.sin(peer.horizontalAngle)));
                } else if (peer.directionX !== undefined) {
                    // directionX: negative = left, positive = right (unit vector component)
                    panValue = Math.max(-1, Math.min(1, peer.directionX));
                }
                smoothParam(pa.panner.pan, panValue, 0.14);

                // Low-pass filter opens up as peers get closer
                const proximity = Math.max(0, Math.min(1, 1 - (peer.distance / 3.0)));
                const filterFrequency = 850 + Math.pow(proximity, 1.25) * 5200;
                smoothParam(pa.filter.frequency, filterFrequency, 0.3);

                // Harmonic gains with exponential proximity curve
                pa.harmonicGains.forEach((hGain, i) => {
                    const threshold = (i + 1) * 0.5; // Unlock at 1.5m, 1.0m, 0.5m
                    const level = exponentialGain(peer.distance, 2.0 - threshold * 0.5, 0.12);
                    const thresholdLevel = peer.distance < (2.0 - threshold * 0.5) ? level * warmupShape : 0;
                    smoothParam(hGain.gain, thresholdLevel, 0.28);
                });
            }
        }

        // Legacy functions kept for compatibility
        function setupHarmonics() {
            // Now handled per-peer in updatePeerAudio
        }

        function stopHarmonics() {
            for (const name of Object.keys(peerAudio)) {
                teardownPeerAudio(name);
            }
        }

        function updateHarmonics() {
            updatePeerAudio();
        }

        function updateTiltDetune() {
            if (!isPlaying || !phoneOsc) return;

            const tiltX = nativeData.tiltX || 0;
            const normalizedTilt = Math.max(-1, Math.min(1, tiltX / 0.5));
            currentDetune = normalizedTilt * maxDetuneCents;

            // Apply detune to root oscillators
            phoneOsc.detune.setTargetAtTime(currentDetune, audioCtx.currentTime, 0.05);
            if (phoneOscTriangle) {
                phoneOscTriangle.detune.setTargetAtTime(currentDetune, audioCtx.currentTime, 0.05);
            }

            const detuneEl = document.getElementById('detuneIndicator');
            if (Math.abs(currentDetune) > 1) {
                detuneEl.textContent = (currentDetune > 0 ? '+' : '') + currentDetune.toFixed(0) + ' cents';
            } else {
                detuneEl.textContent = '';
            }
        }

        let phoneOscTriangle = null;
        let phoneTriGain = null;

        function togglePlay() {
            initAudio();
            const btn = document.getElementById('playButton');

            if (isPlaying) {
                if (phoneGain) {
                    phoneGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                }
                setTimeout(() => {
                    if (phoneOsc) { phoneOsc.stop(); phoneOsc = null; }
                    if (phoneOscTriangle) { phoneOscTriangle.stop(); phoneOscTriangle = null; }
                }, 300);
                stopHarmonics();
                isPlaying = false;
                btn.classList.remove('playing');
                btn.innerHTML = 'TAP TO<br>PLAY';
                document.getElementById('detuneIndicator').textContent = '';
            } else {
                phoneGain = audioCtx.createGain();
                phoneGain.gain.value = 0.7;
                phoneGain.connect(masterGain);

                // Layered oscillators: sine + soft triangle
                phoneOsc = audioCtx.createOscillator();
                phoneOsc.type = 'sine';
                phoneOsc.frequency.value = notes[currentNote];
                phoneOsc.connect(phoneGain);
                phoneOsc.start();

                phoneOscTriangle = audioCtx.createOscillator();
                phoneOscTriangle.type = 'triangle';
                phoneOscTriangle.frequency.value = notes[currentNote];
                phoneTriGain = audioCtx.createGain();
                phoneTriGain.gain.value = 0.15;
                phoneOscTriangle.connect(phoneTriGain);
                phoneTriGain.connect(phoneGain);
                phoneOscTriangle.start();

                isPlaying = true;
                btn.classList.add('playing');
                btn.innerHTML = 'PLAYING';
            }
        }

        // ==================== NATIVE BRIDGE ====================
        // Called by native Swift code
        function updateNativeProximity(distance, peerCount) {
            nativeData.nearestDistance = distance;
            nativeData.peerCount = peerCount;
            updateUI();
        }

        function updateNativeData(data) {
            nativeData = { ...nativeData, ...data };
            updateUI();
            updateTiltDetune();
        }

        function updateUI() {
            const distEl = document.getElementById('distanceValue');
            const peerEl = document.getElementById('peerCount');
            const statusBar = document.getElementById('statusBar');

            if (nativeData.nearestDistance < 0 || nativeData.peerCount === 0) {
                distEl.textContent = '--';
                distEl.classList.add('no-peer');
                peerEl.textContent = '0';
                statusBar.textContent = 'Searching for nearby devices...';
            } else {
                distEl.classList.remove('no-peer');
                if (nativeData.nearestDistance < 1) {
                    distEl.textContent = (nativeData.nearestDistance * 100).toFixed(0) + ' cm';
                } else {
                    distEl.textContent = nativeData.nearestDistance.toFixed(2) + ' m';
                }
                peerEl.textContent = nativeData.peerCount;
                statusBar.textContent = nativeData.peerCount + ' device' + (nativeData.peerCount > 1 ? 's' : '') + ' connected';
            }

            updateHarmonics();
        }

        function updateDisplay() {
            document.getElementById('myNote').textContent = currentNote;
            document.getElementById('myFreq').textContent = notes[currentNote].toFixed(1) + ' Hz';
        }

        // ==================== LOADING ====================
        function setLoadingStep(stepId, state) {
            const step = document.getElementById(stepId);
            if (!step) return;
            step.classList.remove('active', 'done');
            if (state === 'active') step.classList.add('active');
            if (state === 'done') step.classList.add('done');
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) {
                overlay.classList.add('hidden');
                setTimeout(() => overlay.style.display = 'none', 500);
            }
        }

        // ==================== INIT ====================
        async function init() {
            // Step 1: Audio
            setLoadingStep('step-audio', 'active');
            await new Promise(r => setTimeout(r, 300));
            setLoadingStep('step-audio', 'done');

            // Step 2: 3D Scene
            setLoadingStep('step-3d', 'active');
            initThreeJS();
            await new Promise(r => setTimeout(r, 400));
            setLoadingStep('step-3d', 'done');

            // Step 3: UWB (handled by native, we just show it's ready)
            setLoadingStep('step-uwb', 'active');
            await new Promise(r => setTimeout(r, 300));
            setLoadingStep('step-uwb', 'done');

            // Step 4: Searching for peers (stays active until found)
            setLoadingStep('step-peers', 'active');
            await new Promise(r => setTimeout(r, 500));
            setLoadingStep('step-peers', 'done');

            // Hide loading screen
            await new Promise(r => setTimeout(r, 300));
            hideLoading();

            // Note selector
            const selector = document.getElementById('noteSelector');
            selector.innerHTML = Object.keys(notes).map(note => `
                <button class="note-btn ${note === currentNote ? 'selected' : ''}" data-note="${note}">${note}</button>
            `).join('');

            selector.querySelectorAll('.note-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentNote = btn.dataset.note;
                    selector.querySelectorAll('.note-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    updateDisplay();
                    if (phoneOsc) {
                        phoneOsc.frequency.setTargetAtTime(notes[currentNote], audioCtx.currentTime, 0.05);
                    }
                    if (phoneOscTriangle) {
                        phoneOscTriangle.frequency.setTargetAtTime(notes[currentNote], audioCtx.currentTime, 0.05);
                    }
                    updateHarmonics();
                });
            });

            document.getElementById('playButton').addEventListener('click', togglePlay);
            updateDisplay();
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
